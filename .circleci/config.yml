# Javascript Node CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-javascript/ for more details

# Set defaults for all jobs
defaults: &defaults
  working_directory: ~/repo
  environment:
    TZ: /usr/share/zoneinfo/America/New_York
  docker:
    - image: circleci/node:carbon

version: 2
jobs:
  setup:
    <<: *defaults
    steps:
      - checkout
      - run:
          name: Update npm to 5.7.1 to get npm ci
          command: sudo npm install npm@5.7.1 -g
      - run:
          name: Install dependencies
          command: npm ci
      - persist_to_workspace:
          root: ~/repo
          paths:
            - node_modules
  test:linters:
    <<: *defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      - run:
          name: Run linters
          # Setting max warning to treat all eslint warning as errors that break
          # the build. This matches the behavior of npm build and allows us to 
          # fail builds that would otherwise later break. Stylelint only breaks
          # the build on errors because we use verbose warnings to warn about
          # CSS that is not fully supported by our browser support matrix.
          command: | 
            npm run lint-js -- --max-warnings=0 && npm run lint-css

  build:
    <<: *defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      # Generate a build
      - run:
          name: Build the application
          command: |
            npm run build
      - run:
          name: Compress the build directory into a tarball
          command: tar -czf build.tar.gz build
      # Store Assets generated by npm build
      - store_artifacts:
          path: bundlesize
      - store_artifacts:
          path: build.tar.gz
  
  draft-github-release: 
    <<: *defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      - run:
          name: Draft GitHub Release
          command: npm run draft-github-release

  test:unit:
    <<: *defaults
    parallelism: 3
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      # CircleCI 2.0 no longer allows interpolation of env variables. This is the workaround: 
      # https://discuss.circleci.com/t/using-environment-variables-in-config-yml-not-working/14237
      - run: 
          command: mkdir results
      - run:
          name: Set JEST_JUNIT_OUTPUT
          command: echo 'export JEST_JUNIT_OUTPUT="results/junit-$CIRCLE_NODE_INDEX.xml"' >> $BASH_ENV
      - run:
          name: Run tests
          # split tests by timing and then run npm test
          command: |
            circleci tests glob "src/**/*.test.js" | circleci tests split --split-by=timings | \
            xargs npm test -- --testResultsProcessor="jest-junit"  --coverage --ci --maxWorkers=2
      - persist_to_workspace:
          root: ~/repo
          paths:
            - results
            - coverage
            
  coverage:
    <<: *defaults
    steps:
      - checkout
      - attach_workspace:
          at: ~/repo
      - run:
          name: Merge junit results
          command: mkdir junit && npm run junit-merge -- -d results -o junit/junit.xml
      # Store Assets generated by npm test
      - store_artifacts:
          path: junit
      - store_test_results:
          path: junit
      # Uploading all of the LCOV assets is time consuming, and we get this info
      # in CircleCI. However, I'm leaving this here to uncomment if needed.
      # - store_artifacts:
      #     path: coverage

# Define a workflow to specify the run order of jobs
# More info at https://circleci.com/docs/2.0/workflows/
workflows:
  version: 2
  all-but-release:
    jobs:
      - setup:
          filters:
            tags:
              ignore: /^v.*/
      - test:linters:
          requires:
            - setup
          filters:
            tags:
              ignore: /^v.*/
      - test:unit:
          requires:
            - setup
          filters:
            tags:
              ignore: /^v.*/
      - coverage:
          requires:
            - test:unit
          filters:
            tags:
              ignore: /^v.*/


  tagged-release: 
    jobs:
      - setup:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - build:
          requires:
            - setup
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
      - draft-github-release:
          requires:
            - build
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
