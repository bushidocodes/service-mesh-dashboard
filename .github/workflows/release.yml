name: Release

on:
  push:
    tags:
      - "v*"

# Least-privilege GITHUB_TOKEN. The release job drafts a GitHub release
# (POST /repos/.../releases via scripts/generateGitHubDraft.js), which needs
# write access to repository contents; nothing else is required.
permissions:
  contents: write

jobs:
  release:
    name: Build and draft GitHub release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          CI: true
          TZ: America/New_York

      - name: Draft GitHub release
        run: pnpm run draft-github-release
        env:
          GITHUB_ACCESS_KEY: ${{ secrets.GITHUB_TOKEN }}
