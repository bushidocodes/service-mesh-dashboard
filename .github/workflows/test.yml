name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege GITHUB_TOKEN. Every job here only checks out the code and
# runs checks that do not write back to the repo (tests/tsc/biome/e2e/storybook)
# — so read-only contents is sufficient. Applied at the workflow level so all
# jobs inherit it.
permissions:
  contents: read

# Avoid duplicate runs. A push to a feature branch that has an open PR would
# otherwise fire both `push` and `pull_request`. Limiting `push` to master means
# feature branches are covered by `pull_request` only, and master (post-merge)
# by `push`. The concurrency group also cancels superseded in-progress runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # KD-13: collect coverage and fail if line coverage is below 60%
      # (thresholds.lines in vite.config.js). Local `pnpm test` stays watch-mode
      # without coverage; use `pnpm test:coverage` for a local gate check.
      - name: Run tests with coverage
        run: pnpm test:coverage
        env:
          CI: true
          TZ: America/New_York

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate against type regressions. As `strict` is ratcheted on one flag at a
      # time, this floor rises; it must stay green at every step.
      - name: Run tsc
        run: pnpm run typecheck

      # E2E TypeScript project (playwright.config.ts + e2e/**). Chromium-only
      # runtime is unchanged; this only type-checks the specs/helpers.
      - name: Run e2e tsc
        run: pnpm run typecheck:e2e

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome
        run: pnpm run lint

  build:
    name: Production build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production build
        run: pnpm build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Browser binaries aren't in the pnpm store; install just Chromium (the
      # only project configured in playwright.config.ts) plus its OS deps.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # playwright.config.ts's webServer boots `pnpm start` (Vite + mock SDS);
      # CI=true makes reuseExistingServer false so Playwright owns the server.
      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  storybook:
    name: Storybook
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Static build compiles Storybook preview/config plus all
      # *.stories.@(js|jsx|ts|tsx) files through the app Vite pipeline.
      # Fails if preview, config, or any story cannot compile.
      - name: Build Storybook
        run: pnpm build-storybook
