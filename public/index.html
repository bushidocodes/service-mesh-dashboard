<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">


  <!-- Attributes for static deployment -->

  <!--
    fabricServer is the endpoint needed to reach the fabricServer API.
    Vite serves root index.html in development/build; this file is a static
    fallback template. Set content to your Fabric server URL for production,
    or leave __FABRIC_SERVER__ for serve-time injection (see docker-prod).
  -->
  <meta property="fabricServer" content="__FABRIC_SERVER__">

  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="shortcut icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
  <link rel="shortcut icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
  <link rel="shortcut icon" href="/favicon.ico">
  <title>Grey Matter Fabric</title>
</head>

<body>
  <div id="root"></div>
</body>

</html>
